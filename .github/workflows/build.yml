name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller python-docx openpyxl xlrd

      - name: Build EXE
        run: pyinstaller --onedir --windowed --name "SKZIgen" "SKZIgen 2.1.py"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SKZIgen_Windows
          path: dist/SKZIgen/
